external_components:
  - source: github://onemikedelta/esphome_pl7211

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  miso_pin: GPIO12

pl7211:
  cs_pin: GPIO15
  update_interval: 5s

sensor:
  - platform: pl7211
    voltage:
      name: "Voltage"
    current:
      name: "Current"
    power:
      name: "Active Power"
    frequency:
      name: "Frequency"
    power_factor:
      name: "Power Factor"

switch:
  - platform: pl7211
    name: "Relay 1 (GPIO 9)"
    bit: 1  # GPIO 9'un 0x3905 register'ındaki bit numarası

  - platform: pl7211
    name: "Relay 2 (GPIO 12)"
    bit: 4

  - platform: pl7211
    name: "Relay 3 (GPIO 13)"
    bit: 5
    